<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox | 24h Calendar Board</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --hour-height: 100px; 
            --header-height: 60px;
            --time-axis-width: 80px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Allow body to scroll if content overflows small screens, 
               but the calendar has its own internal scroll */
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 40px); /* Account for body padding */
            display: flex;
            flex-direction: column;
        }

        header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .calendar-wrapper {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Clips the inner scrollable area to the rounded corners */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            min-height: 400px;
        }

        .calendar-header {
            flex-shrink: 0;
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #1e293b;
            z-index: 20;
        }

        .time-corner {
            width: var(--time-axis-width);
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
        }

        .days-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
        }

        .day-header {
            padding: 15px 5px;
            text-align: center;
            border-right: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .day-header span {
            display: block;
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .day-header.today {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
        }

        /* The Scrollable Container */
        .calendar-scroll {
            flex-grow: 1;
            overflow-y: auto; /* Explicitly allow vertical scrolling */
            overflow-x: hidden;
            display: flex;
            position: relative;
            background: rgba(0, 0, 0, 0.05);
        }

        .time-axis {
            width: var(--time-axis-width);
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .time-label {
            height: var(--hour-height);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
            padding-right: 10px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding-top: 5px;
            box-sizing: border-box;
        }

        .grid-body {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            position: relative;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 100% var(--hour-height);
            /* This ensures the scrollable area is actually long enough for 24 hours */
            height: calc(var(--hour-height) * 24);
            min-width: 0;
        }

        .grid-column {
            position: relative;
            height: 100%;
            border-right: 1px solid var(--border-color);
        }

        .current-time-indicator {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #ef4444;
            z-index: 50;
            pointer-events: none;
        }

        .current-time-indicator::before {
            content: '';
            position: absolute;
            left: -4px;
            top: -4px;
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
        }

        .calendar-scroll::-webkit-scrollbar {
            width: 10px;
        }
        .calendar-scroll::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        .calendar-scroll::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 10px;
            border: 2px solid var(--card-bg);
        }
        .calendar-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Velox Planner</h1>
            <div id="date-info" style="text-align: right">
                <div id="current-week-display" style="font-weight: bold;">Current Week</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">Monday — Sunday | 24 Hours</div>
            </div>
        </header>

        <div class="calendar-wrapper">
            <div class="calendar-header">
                <div class="time-corner"></div>
                <div class="days-row">
                    <div class="day-header" id="day-0">MON</div>
                    <div class="day-header" id="day-1">TUE</div>
                    <div class="day-header" id="day-2">WED</div>
                    <div class="day-header" id="day-3">THU</div>
                    <div class="day-header" id="day-4">FRI</div>
                    <div class="day-header" id="day-5">SAT</div>
                    <div class="day-header" id="day-6">SUN</div>
                </div>
            </div>

            <div class="calendar-scroll" id="calendar-scroll">
                <div class="time-axis" id="time-labels"></div>
                <div class="grid-body" id="grid-body">
                    <div class="current-time-indicator" id="time-now"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                    <div class="grid-column"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const HOUR_HEIGHT = 100;
        const scrollContainer = document.getElementById('calendar-scroll');
        const timeLabels = document.getElementById('time-labels');
        const timeNowLine = document.getElementById('time-now');

        // 1. Generate Time Labels (0 to 23)
        for(let i = 0; i < 24; i++) {
            const label = document.createElement('div');
            label.className = 'time-label';
            label.innerText = `${i}:00`;
            timeLabels.appendChild(label);
        }

        // 2. Setup Current Week Dates
        function setupDates() {
            const now = new Date();
            const day = now.getDay(); 
            const diff = now.getDate() - (day === 0 ? 6 : day - 1); 
            const monday = new Date(new Date().setDate(diff));

            for(let i = 0; i < 7; i++) {
                const current = new Date(monday);
                current.setDate(monday.getDate() + i);
                const el = document.getElementById(`day-${i}`);
                if(el) {
                    const dateStr = current.getDate();
                    const monthStr = current.toLocaleString('default', { month: 'short' });
                    const originalText = el.innerText.split('\n')[0];
                    el.innerHTML = `${originalText}<br><span>${dateStr} ${monthStr}</span>`;
                    
                    if(new Date().toDateString() === current.toDateString()) {
                        el.classList.add('today');
                    }
                }
            }
        }

        // 3. Update Red Line Position
        function updateTimeLine() {
            const now = new Date();
            const hrs = now.getHours();
            const mins = now.getMinutes();
            const secs = now.getSeconds();

            const totalMinutes = (hrs * 60) + mins + (secs / 60);
            const topPosition = (totalMinutes / 60) * HOUR_HEIGHT;
            
            if (timeNowLine) {
                timeNowLine.style.top = `${topPosition}px`;
            }
        }

        setupDates();
        updateTimeLine();
        setInterval(updateTimeLine, 1000);

        // Explicitly scroll to current time
        window.onload = () => {
            const hrs = new Date().getHours();
            const scrollTarget = (hrs * HOUR_HEIGHT) - (scrollContainer.clientHeight / 3);
            scrollContainer.scrollTop = Math.max(0, scrollTarget);
        };
    </script>
</body>
</html>
