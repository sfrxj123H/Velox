<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Velox</title>
    <link href="../styles/main.css" rel="stylesheet">
</head>
<body>
    <div class="intro">
        <section class="card" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 100%; width: 80%;">
            <h2 style="text-align: center; font-style: italic; line-height: 1.4; margin-bottom: .5rem;">
                Sign Up To <b style="color: var(--accent-color); font-style: normal;">Velox</b>!
            </h2>
            <h4 style="text-align: center;">Start organizing work effectively today!</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1%;" class="accountBox">
                <div>
                    <h3>Your Name:</h3>
                    <input type="text" class="card" style="
                    width: 100%;
                    height: 25px;
                    border-color: var(--accent-color);
                    color: var(--text-color);
                    font-size: large;
                    font-family: var(--font-main);
                    font-weight: bold;
                    padding: 1rem !important;
                    margin-bottom: .5rem;">
                </div>
                <div>
                    <h3>Your email:</h3>
                    <input type="email" class="card" style="
                    width: 100%;
                    height: 25px;
                    border-color: var(--accent-color);
                    color: var(--text-color);
                    font-size: large;
                    font-family: var(--font-main);
                    font-weight: bold;
                    padding: 1rem !important;
                    margin-bottom: .5rem;">
                </div>
                <div>
                    <h3>Create a password:</h3>
                    <input type="password" class="card" style="
                    width: 100%;
                    height: 25px;
                    border-color: var(--accent-color);
                    color: var(--text-color);
                    font-size: large;
                    font-family: var(--font-main);
                    font-weight: bold;
                    padding: 1rem !important;
                    margin-bottom: .5rem;">
                </div>
                <div>
                    <h3>Verify your password:</h3>
                    <input type="password" class="card" style="
                    width: 100%;
                    height: 25px;
                    border-color: var(--accent-color);
                    color: var(--text-color);
                    font-size: large;
                    font-family: var(--font-main);
                    font-weight: bold;
                    padding: 1rem !important;
                    margin-bottom: .5rem;">
                </div>
            </div>
            <br>
            <div style="display: flex; justify-content: center; align-items: center">
                <input type="checkbox" style="width: 30px; height: 30px;">&nbsp;&nbsp;&nbsp;
                <p>By signing up, you agree to Velox's <a>Terms of use</a>.</p>
            </div>
            <br>
            <button style="display: block; margin: auto;"><h4>Sign Up</h4></button>
        </section>
    </div>
</body>
</html>
